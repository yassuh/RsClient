services:
  realityscan:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REALITYSCAN_DEB: ${REALITYSCAN_DEB:-RealityScan.deb}
    image: ${RS_IMAGE:-ubuntu-realityscan:v2.2.0.119039}
    container_name: ${RS_CONTAINER_NAME:-rsclient}
    environment:
      DISPLAY: ${DISPLAY:-:0}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-}
      PULSE_SERVER: ${PULSE_SERVER:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      RS_SKIP_PREFLIGHT: ${RS_SKIP_PREFLIGHT:-0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${RS_HOST_DOWNLOADS:-./host-data}:/mnt/host
      - ${RS_HOST_VULKAN_ICD_PATH:-/etc/vulkan/icd.d}:/usr/share/vulkan/icd.d:ro
    gpus: all
    stdin_open: true
    tty: true
    networks:
      - studio-network

networks:
  studio-network:
    external: true
    name: studio-network
